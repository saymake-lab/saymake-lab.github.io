<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayMake Studio | 스마트한 라이더를 위한 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <header class="text-center mb-16 flex flex-col items-center">
        <img src="apps/delivery-rider-log/images/saymake_log.png" alt="SayMake Logo" class="h-32 w-auto mb-6" />
        <div class="inline-block px-4 py-1.5 mb-4 text-xs font-bold tracking-widest text-orange-500 uppercase bg-orange-500/10 rounded-full border border-orange-500/20">
            SayMake Studio
        </div>
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight">Crafting Digital Tools.</h1>
        <p class="text-slate-400 text-lg max-w-md mx-auto">우리는 배달 라이더의 일상을 더 스마트하고 편리하게 만드는 도구를 만듭니다.</p>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- App: Delivery Rider Log -->
        <a href="apps/delivery-rider-log/index.html" class="glass group relative block p-8 rounded-3xl transition-all hover:scale-[1.02] hover:border-orange-500/50">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-orange-500/20">🛵</div>
                <div>
                    <h3 class="text-xl font-bold">배달 라이더로그</h3>
                    <p class="text-sm text-slate-500">Delivery Rider Log</p>
                </div>
            </div>
            <p class="text-slate-400 text-sm leading-relaxed mb-6">수익 관리부터 유류비 계산, 소모품 교체 주기까지. 라이더에게 꼭 필요한 모든 것을 담았습니다.</p>
            <div class="flex items-center text-orange-500 text-sm font-bold">
                자세히 보기
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </div>
        </a>

        <!-- Coming Soon Placeholder -->
        <div class="glass flex flex-col items-center justify-center p-8 rounded-3xl opacity-50 border-dashed">
            <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center text-xl mb-4 text-slate-500">+</div>
            <p class="text-slate-500 font-medium italic">Next Tool Coming Soon...</p>
        </div>
    </main>

    <footer class="mt-20 text-slate-600 text-xs text-center flex flex-col items-center gap-4">
        <img src="apps/delivery-rider-log/images/saymake_log.png" alt="SayMake Logo" class="h-12 w-auto opacity-50 hover:opacity-100 transition-opacity" />
        <div>
            <p>&copy; 2026 SayMake Studio. All rights reserved.</p>
        <div class="mt-2 flex justify-center gap-4">
            <a href="mailto:saymake.official@gmail.com" class="hover:text-slate-400">Contact</a>
            <a href="#" class="hover:text-slate-400">GitHub</a>
        </div>
    </footer>
</body>
</html>
